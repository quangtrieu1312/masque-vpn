services:
  masqued:
    build: .
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 443:443/udp
    volumes:
      - ./certs:/opt/masqued/certs
      - ./ca:/opt/masqued/ca
      - ./masqued.conf:/opt/masqued/masqued.conf
      - db:/opt/masqued/data
    command: /run.sh
volumes:
    db:
