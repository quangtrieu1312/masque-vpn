services:
  masqued:
    build: .
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    environment:
      - GOTRACEBACK=all
    sysctls:
      net.core.rmem_max: 134217728
      net.core.wmem_max: 134217728
      net.core.rmem_default: 33554432
      net.core.wmem_default: 33554432
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 443:443/udp
      - 127.0.0.1:6060:6060
    volumes:
      - ./certs:/etc/masqued/certs
      - ./ca:/etc/masqued/ca
      - ./masqued.conf:/etc/masqued/masqued.conf
      - db:/etc/masqued/data
    command: /run.sh
volumes:
    db:
