services:
  masqued:
    build: .
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    environment:
      - QUIC_GO_DISABLE_GSO:false
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 443:443/udp
    volumes:
      - ./certs:/etc/masqued/certs
      - ./ca:/etc/masqued/ca
      - ./masqued.conf:/etc/masqued/masqued.conf
      - db:/etc/masqued/data
    command: /run.sh
volumes:
    db:
