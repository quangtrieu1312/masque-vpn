name: Alpine APK Release

on:
  push:
    tags:
      - "v*"

env:
  ALPINE_VERSION: "3.23"
  PKG_NAME: masque
  CODEBERG_REPO: "main"

jobs:
  # ──────────────────────────────────────────────
  # Phase 1 – Build production binary
  # ──────────────────────────────────────────────
  build:
    name: Build Alpine binary (${{ matrix.alpine_arch }})
    strategy:
      matrix:
        include:
          - goarch: amd64
            alpine_arch: x86_64
            runner: ubuntu-latest
          - goarch: arm64
            alpine_arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      pkgver: ${{ steps.meta.outputs.pkgver }}
      pkgrel: ${{ steps.meta.outputs.pkgrel }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install C toolchain
        run: sudo apt-get install -y gcc musl-tools

      - name: Resolve version metadata
        id: meta
        run: |
          VERSION="$(cat client/VERSION)"
          PKGREL="${VERSION##*-}"
          PKGVER="${VERSION%-*}"
          if [ "$PKGREL" = "$PKGVER" ]; then
            PKGREL=0
          fi
          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$PKGREL" >> "$GITHUB_OUTPUT"

      - name: Build production binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: musl-gcc
        run: |
          cd client/src
          go build \
            -buildvcs=false \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.pkgver }}" \
            -trimpath \
            -o ../../dist/masque-${{ matrix.alpine_arch }} \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: masque-bin-${{ matrix.alpine_arch }}
          path: dist/masque-${{ matrix.alpine_arch }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Phase 2 – Package and publish APK
  # ──────────────────────────────────────────────
  package:
    name: Package & publish APK (${{ matrix.alpine_arch }})
    needs: build
    environment: PRODUCTION
    strategy:
      matrix:
        include:
          - alpine_arch: x86_64
            runner: ubuntu-latest
          - alpine_arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: masque-bin-${{ matrix.alpine_arch }}
          path: dist/

      - name: Resolve version metadata
        id: meta
        run: |
          VERSION="$(cat client/VERSION)"
          PKGREL="${VERSION##*-}"
          PKGVER="${VERSION%-*}"
          if [ "$PKGREL" = "$PKGVER" ]; then
            PKGREL=0
          fi
          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$PKGREL" >> "$GITHUB_OUTPUT"

      - name: Build and collect APK
        env:
          PKGVER: ${{ steps.meta.outputs.pkgver }}
          PKGREL: ${{ steps.meta.outputs.pkgrel }}
          ALPINE_ARCH: ${{ matrix.alpine_arch }}
          PKG_NAME: ${{ env.PKG_NAME }}
        run: |
          # prepare workspace on host
          mkdir -p apkbuild/$PKG_NAME
          cp dist/masque-$ALPINE_ARCH             apkbuild/$PKG_NAME/masque
          cp client/masque.conf.template          apkbuild/$PKG_NAME/
          cp client/packaging/alpine/masque.initd apkbuild/$PKG_NAME/
          sed \
            -e "s|%%PKGVER%%|$PKGVER|g" \
            -e "s|%%PKGREL%%|$PKGREL|g" \
            client/packaging/alpine/APKBUILD.tpl > apkbuild/$PKG_NAME/APKBUILD
          chmod +x apkbuild/$PKG_NAME/masque

          # run abuild inside Alpine container
          docker run --rm \
            -v "${{ github.workspace }}/apkbuild:/apkbuild" \
            -v "${{ github.workspace }}/repo:/repo" \
            alpine:3.23 sh -c "
              apk update && apk add --no-cache abuild doas
              adduser -D builduser
              addgroup builduser abuild
              su builduser -c 'abuild-keygen -a -n'
              cp /home/builduser/.abuild/*.pub /etc/apk/keys/
              chown -R builduser /apkbuild /home/builduser/.abuild
              chmod +x /apkbuild/$PKG_NAME/masque
              su builduser -c 'cd /apkbuild/$PKG_NAME && abuild checksum && abuild -r'
              mkdir -p /repo/$ALPINE_ARCH
              find /home/builduser/packages -name '*.apk' -exec cp {} /repo/$ALPINE_ARCH/ \;
            "

      - name: Publish to Codeberg Alpine registry
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_OWNER: ${{ secrets.CODEBERG_OWNER }}
        run: |
          for apk in repo/${{ matrix.alpine_arch }}/*.apk; do
            filename=$(basename "$apk")
            echo "Uploading $filename. This will overwrite upstream file if there is one."
            curl --silent \
              --user "$CODEBERG_OWNER:$CODEBERG_TOKEN" \
              -X DELETE \
              "https://codeberg.org/api/packages/$CODEBERG_OWNER/alpine/v${{ env.ALPINE_VERSION }}/${{ env.CODEBERG_REPO }}/${{ matrix.alpine_arch }}/$filename" || true
            curl --fail \
              --user "$CODEBERG_OWNER:$CODEBERG_TOKEN" \
              --upload-file "$apk" \
              "https://codeberg.org/api/packages/$CODEBERG_OWNER/alpine/v${{ env.ALPINE_VERSION }}/${{ env.CODEBERG_REPO }}"
          done

      - name: Collect APK output for Github Release
        run: |
          # We need this since Codeberg does not like filename with arch
          # While Github cannot distiguish different .apk arch
          mkdir -p release/${{ matrix.alpine_arch }}
          for apk in repo/${{ matrix.alpine_arch }}/*.apk; do
            filename=$(basename "$apk")
            # inject arch into filename before extension
            # masque-0.1.0-r0.apk → masque-0.1.0-r0.x86_64.apk
            newname="${filename%.apk}.${{ matrix.alpine_arch }}.apk"
            cp "$apk" "release/${{ matrix.alpine_arch }}/$newname"
          done

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.alpine_arch }}/*.apk
