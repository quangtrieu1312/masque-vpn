name: Alpine APK Release

on:
  push:
    tags:
      - "v*"
      - "feature/*"
  workflow_dispatch:
    inputs:
      pkgver:
        description: "Package version (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

env:
  ALPINE_VERSION: "3.23"
  PKG_NAME: masque-vpn-client

jobs:
  # ──────────────────────────────────────────────
  # Phase 1 – Build production binary on Alpine
  # ──────────────────────────────────────────────
  build:
    name: Build Alpine binary
    runs-on: ubuntu-latest
    container:
      image: golang:tip-alpine
    outputs:
      pkgver: ${{ steps.meta.outputs.pkgver }}
      pkgrel: ${{ steps.meta.outputs.pkgrel }}

    steps:
      - name: Install C toolchain (for CGO / musl dynamic linking)
        run: apk add --no-cache git gcc musl-dev build-base

      - uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKGVER="${{ github.event.inputs.pkgver }}"
          else
            PKGVER="${GITHUB_REF_NAME#v}"
          fi
          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"
          echo "pkgrel=0"       >> "$GITHUB_OUTPUT"

      - name: Build production binary
        env:
          # CGO_ENABLED=1 → dynamically linked against musl libc (Alpine native)
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        # Source root moved to client/src/ on this branch
        run: |
          cd client/src
          go build \
            -buildvcs=false \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.pkgver }}" \
            -trimpath \
            -o ../../dist/masque-vpn-client \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: masque-vpn-client-bin
          path: dist/masque-vpn-client
          retention-days: 1

  # ──────────────────────────────────────────────
  # Phase 2 – Package, sign, and publish APK
  # ──────────────────────────────────────────────
  package:
    name: Package & publish APK
    needs: build
    runs-on: ubuntu-latest
    environment: PROD
    container:
      image: alpine:latest
    permissions:
      contents: write   # needed for gh-pages push and GitHub Releases

    steps:
      - name: Install packaging tools
        run: |
          apk add --no-cache \
            abuild \
            alpine-sdk \
            git \
            curl \
            sudo
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: masque-vpn-client-bin
          path: dist/
      - name: Publish to Codeberg Alpine registry
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_OWNER: ${{ secrets.CODEBERG_OWNER }}
        run: |
          for apk in repo/x86_64/*.apk; do
            curl --fail \
              --user "$CODEBERG_OWNER:$CODEBERG_TOKEN" \
              --upload-file "$apk" \
              "https://codeberg.org/api/packages/$CODEBERG_OWNER/alpine/v${{ env.ALPINE_VERSION }}/main"
          done
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: repo/x86_64/*.apk
