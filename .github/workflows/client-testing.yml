name: Alpine APK Testing

on:
  push:
    branch:
      - "feature/*"

env:
  ALPINE_VERSION: "3.23"
  PKG_NAME: masque

jobs:
  # ──────────────────────────────────────────────
  # Phase 1 – Build production binary on Alpine
  # ──────────────────────────────────────────────
  build:
    name: Build Alpine binary
    container:
      image: golang:tip-alpine3.23
    strategy:
      matrix:
        include:
          - goarch: amd64
            alpine_arch: x86_64
            runner: ubuntu-latest
          - goarch: arm64
            alpine_arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      pkgver: ${{ steps.meta.outputs.pkgver }}
      pkgrel: ${{ steps.meta.outputs.pkgrel }}

    steps:
      - name: Install C toolchain
        run: apk update && apk add --no-cache git gcc musl-dev build-base

      - uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        run: |
          VERSION="$(cat client/VERSION)"
          PKGREL="${VERSION##*-}"                 # extract suffix after last -
          PKGVER="${VERSION%-*}"                  # strip suffix

          # if no suffix, pkgrel defaults to 0
          if [ "$PKGREL" = "$PKGVER" ]; then
            PKGREL=0
          fi

          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$PKGREL" >> "$GITHUB_OUTPUT"

      - name: Build production binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd client/src
          go build \
            -buildvcs=false \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.pkgver }}" \
            -trimpath \
            -o ../../dist/masque-${{ matrix.alpine_arch }} \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: masque-bin-${{ matrix.alpine_arch }}
          path: dist/masque-${{ matrix.alpine_arch }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Phase 2 – Package and publish APK
  # ──────────────────────────────────────────────
  package:
    name: Package & publish APK
    needs: build
    environment: TESTING
    strategy:
      matrix:
        include:
          - goarch: amd64
            alpine_arch: x86_64
            runner: ubuntu-latest
          - goarch: arm64
            alpine_arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: alpine:3.23
    permissions:
      contents: write

    steps:
      - name: Install packaging tools
        run: apk update && apk add --no-cache abuild doas git curl

      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: masque-bin-${{ matrix.alpine_arch }}
          path: dist/

      - name: Setup build user and throwaway signing key
        run: |
          adduser -D builduser
          addgroup builduser abuild
          su builduser -c "abuild-keygen -a -n"
          cp /home/builduser/.abuild/*.pub /etc/apk/keys/

      - name: Build APK
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
          PKGREL: ${{ needs.build.outputs.pkgrel }}
        run: |
          mkdir -p /apkbuild/${{ env.PKG_NAME }}
          cp dist/masque-${{ matrix.alpine_arch }} /apkbuild/${{ env.PKG_NAME }}/masque
          cp client/masque.conf.template /apkbuild/${{ env.PKG_NAME }}/
          cp client/packaging/alpine/masque.initd /apkbuild/${{ env.PKG_NAME }}/
          sed \
            -e "s|%%PKGVER%%|$PKGVER|g" \
            -e "s|%%PKGREL%%|$PKGREL|g" \
            client/packaging/alpine/APKBUILD.tpl > /apkbuild/${{ env.PKG_NAME }}/APKBUILD
          chown -R builduser /apkbuild /home/builduser/.abuild
          chmod +x /apkbuild/${{ env.PKG_NAME }}/masque
          su builduser -c "cd /apkbuild/${{ env.PKG_NAME }} && abuild checksum && abuild -r"

      - name: Collect APK output
        run: |
          mkdir -p repo/${{ matrix.alpine_arch }}
          find /home/builduser/packages -name '*.apk' -exec cp {} repo/${{ matrix.alpine_arch }}/ \;

      - name: Publish to Codeberg Alpine registry
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_OWNER: ${{ secrets.CODEBERG_OWNER }}
        run: |
          for apk in repo/${{ matrix.alpine_arch }}/*.apk; do
            filename=$(basename "$apk")
            arch=$(echo "$filename" | rev | cut -d. -f2 | rev)
            # delete first in case it already exists (e.g. noarch from other matrix job)
            curl --silent \
              --user "$CODEBERG_OWNER:$CODEBERG_TOKEN" \
              -X DELETE \
              "https://codeberg.org/api/packages/$CODEBERG_OWNER/alpine/v${{ env.ALPINE_VERSION }}/testing/$arch/$filename" || true
            curl --fail \
              --user "$CODEBERG_OWNER:$CODEBERG_TOKEN" \
              --upload-file "$apk" \
              "https://codeberg.org/api/packages/$CODEBERG_OWNER/alpine/v${{ env.ALPINE_VERSION }}/testing"
          done
