services:
  masque-client-1:
    build: .
    container_name: client1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    volumes:
      - ./certs:/opt/masque/certs
      - ./config:/opt/masque/config
  masque-client-2:
    build: .
    container_name: client2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    volumes:
      - ./certs:/opt/masque/certs
      - ./config:/opt/masque/config
